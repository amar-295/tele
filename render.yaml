# Render Blueprint — https://render.com/docs/infrastructure-as-code
#
# Telegram webhooks need a **Web** service (HTTPS). Use free `plan: free` here.
# Set TELEGRAM_WEBHOOK_URL to https://<this-service-host>/<path> (same path you use in the URL).
# Ephemeral disk: SQLite/Chroma live in the container unless you add a paid disk or external DB.
#
# Monorepo: repo root contains this file and `telegram-ai-bot/`. For a bot-only repo,
# move `render.yaml` to that root and remove `rootDir`.

services:
  - type: web
    name: telegram-ai-bot
    runtime: python
    region: oregon
    plan: free
    rootDir: telegram-ai-bot
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OWNER_CHAT_ID
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_WEBHOOK_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
